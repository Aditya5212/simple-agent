# redis.conf

# ── Persistence (critical for BullMQ — jobs must survive restarts) ──────
# AOF: logs every write. Safest for job queues.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB snapshot as backup (belt + suspenders)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# ── Memory ──────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy noeviction

# ── BullMQ connection requirements ──────────────────────────────────────
# BullMQ sets maxRetriesPerRequest: null — needs no timeout on blocking calls
timeout 0
tcp-keepalive 60

# ── Security ────────────────────────────────────────────────────────────
# Uncomment and set a password for production
# requirepass your_strong_redis_password_here
bind 0.0.0.0

# ── Logging ─────────────────────────────────────────────────────────────
loglevel notice
