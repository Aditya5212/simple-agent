name: simple-agent

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: simple_agent_db
    restart: always
    environment:
      POSTGRES_USER: mastra
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: simple_agent
    ports:
      - "5433:5432"
    volumes:
      - simple_agent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastra"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.2-alpine
    container_name: simple_agent_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - simple_agent_redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  simple_agent_pg_data:
  simple_agent_redis_data:
